[build]
  base = "frontend"
  command = "npm run build"
  publish = "dist"

# Proxy all /api calls to the Railway backend
[[redirects]]
  from = "/api/*"
  to = "https://REPLACE_WITH_RAILWAY_URL/:splat"
  status = 200
  force = true

# SPA fallback — serve index.html for all frontend routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
